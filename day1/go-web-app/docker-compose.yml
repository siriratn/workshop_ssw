
services:
  go-web-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: go-web-app
    ports:
      - "8081:8080"
    environment:
      - HOST=0.0.0.0
      - PORT=8080
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:               # ← alias ใน compose
    name: rust-web-app_default  # ← ชื่อ network จริงบน Docker
    external: true              # ← ไม่ต้องสร้างใหม่