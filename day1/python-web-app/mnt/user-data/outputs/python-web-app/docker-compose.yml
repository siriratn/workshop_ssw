services:
  python-web-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: python-web-app
    ports:
      - "8084:8080"    # Rust=8080, Go=8081, Bash=8082, C#=8083, Python=8084
    environment:
      - HOST=0.0.0.0
      - PORT=8080
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    name: rust-web-app_default
    external: true
