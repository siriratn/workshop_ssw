apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  labels:
    app: nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx:1.25-alpine
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "100m"
            memory: "128Mi"
        volumeMounts:                          # ← เพิ่ม
        - name: config-volume
          mountPath: /usr/share/nginx/html     # แทน index.html ของ nginx
      volumes:                                 # ← เพิ่ม
      - name: config-volume
        configMap:
          name: nginx-cm                       # ชื่อ ConfigMap ที่สร้างไว้